# 使用 gh-pages 分支发布，避免 configure-pages / deploy-pages 在部分仓库上报 Not Found。
# 跑绿后：Settings → Pages → Source 选「Deploy from a branch」→ Branch: gh-pages → / (root)

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: |
            .github
            *.bat
